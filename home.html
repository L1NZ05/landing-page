<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div class="logo">Header logo</div>
        <ul class="header-links">
            <li><a href="#">link one</a></li>
            <li><a href="#">link two</a></li>
            <li><a href="#">link three</a></li>
        </ul>
    </div>

    <div class="title-block">
        <div class="about">
            <div class="main-title">This website is awesome</div>
            <div class="subtext">This website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast</div>
            <button class="button">Sign up</button> 
        </div>
        <div class="kasumi">
            This is a placeholder for kasumi img
        </div>
    </div>

    <div class="info-block-2">
        <div class="card-header"> Some random information</div>
        <div class="card-con">
            <div class="card"></div>
        </div>
        <div class="card-con">
            <div class="card"></div>
        </div>
        <div class="card-con">
            <div class="card"></div>
        </div>
        <div class="card-con">
        <div class="card"></div>
        </div>
    </div>

    <div class="quote-block">
        <p class="quote"></p>
        <p class="author"></p>
    </div>
    
    <div class="signup-block">
        <div class="signup-con">
            <div class="signup-header"></div>
            <div class="subtext"></div>
        </div>
        <button class="button-2">Sign up</button>
    </div>

        Copright: @ Katou :3
